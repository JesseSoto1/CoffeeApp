<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/mystyle.css">
    <script src="https://kit.fontawesome.com/337be747ec.js" crossorigin="anonymous"></script>
    <title>My Shop</title>
</head>
<body>
<header class="header">
    <div class="logo">My Shop</div>
    <nav class="nav">
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="cart.html">Cart</a></li>

        </ul>
    <div class="icons">
        <i class="fa fa-search"></i>
        <i class="fa fa-shopping-cart"></i>
        <i class="fa fa-user"></i>

    </div>
    
    <div class="toggle">
        <i class="fa fa-bars"></i>
    </div>
    </nav>
</header>

    <section class="products">
    <h2>Our Products</h2>

    <div class="cards">

        <article class="card" data-name="Cappuchino" data-price="4.99">
            <img src="/images/cappuchino.png" alt="product">
            <h3>Cappuchino</h3>
            <p class="price">$4.99</p>

            <button class="add-cart">Add to Cart</button>
            <button class="buy-now">Buy Now!</button>
        </article>

        <article class="card">
            

            <img src="/images/caramel-macchiato.png" alt="product">
            <h3>Caramle Macchiato</h3>
            <p class="price">$6.99</p>

            <button class="add-cart">Add to Cart</button>
            <button class="buy-now">Buy Now!</button>
        </article>

        <article class="card">
            

            <img src="/images/Cold-Brew.png" alt="product">
            <h3>Cold Brew</h3>
            <p class="price">$5.99</p>

            <button class="add-cart">Add to Cart</button>
            <button class="buy-now">Buy Now!</button>
        </article>

        <article class="card">
            

            <img src="/images/Nitro-Cold-Brew.png" alt="product">
            <h3>Nitro Cold Brew</h3>
            <p class="price">$7.99</p>

            <button class="add-cart">Add to Cart</button>
            <button class="buy-now">Buy Now!</button>
        </article>

    </div>
</section>

<script src="toggle.js"></script>
<script src="cart.js"></script>
</body>
</html>
